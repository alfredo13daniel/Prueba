<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#f0f0f0; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif; }
        button { padding:20px 30px; font-size:24px; font-weight:bold; background:#58cc02; color:white; border:none; border-radius:16px; border-bottom:6px solid #46a302; cursor:pointer; }
        button:active { border-bottom-width:0; margin-top:6px; }
    </style>
</head>
<body>
    <button id="b" onclick="c()">CLICS: 0</button>
    <script>
        var n=0;
        function c(){
            n++;
            document.getElementById('b').innerHTML='CLICS: '+n;
            window.parent.postMessage(n.toString(), '*');
        }
    </script>
</body>
  </html>
